version: '3.7'

services:
  postgres:
    image: 'postgres:latest'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - 'POSTGRES_DB=mydatabase'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432'

  rabbitmq:
    image: 'rabbitmq:latest'
    environment:
      - 'RABBITMQ_DEFAULT_PASS=secret'
      - 'RABBITMQ_DEFAULT_USER=myuser'
    ports:
      - '5672'

  keycloak:
    image: quay.io/keycloak/keycloak:legacy
    environment:
      DB_VENDOR: POSTGRES
      DB_ADDR: postgres
      DB_DATABASE: keycloak
      DB_USER: keycloak
      DB_SCHEMA: public
      DB_PASSWORD: password
      KEYCLOAK_USER: local
      KEYCLOAK_PASSWORD: local
    ports:
      - 8080:8080
    depends_on:
      - postgres
  back:
    container_name: schub_back
    build: ./../Back
    ports:
      - "8090:8090"
    restart: on-failure
    volumes:
      - .m2:/root/.m2
    stdin_open: true
    tty: true

  front:
    container_name: schub_front
    build: ./../Front
    ports:
      - "8080:8080"
    restart: on-failure
    volumes:
      - .m2:/root/.m2
    stdin_open: true
    tty: true


  minecraft:
    image: itzg/minecraft-server
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
    deploy:
      resources:
        limits:
          memory: 2048M
    volumes:
      - "~/minecraft_data:/data"

networks:
  default:
    name: poplabng_network

volumes:
  postgres_data:

