#Principale Network Configuration

networks:
  default:
    name: nextcloud_default
    driver: bridge

#Log Configuration

x-logging:
  &default-logging
  driver: "json-file"
  options:
    tag: "{{.Name}}"

#Container Configuration

services:
  nextcloud:
    container_name: ${NEXTCLOUD_CONTAINER_NAME}
    image: nextcloud
    ports:
      - "8080:80"
    volumes:
      - /home/data/hdd_save/NextCloud:/var/www/html
    environment:
      - MYSQL_HOST=nextcloud_db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloudpass
    depends_on:
      - nextcloud_db
    logging: *default-logging
    restart: always


  nextcloud_db:
    container_name: ${NEXTCLOUD_DB_CONTAINER_NAME}
    image: mariadb
    volumes:
      - ${ROOT_PROJECT_DATA_DIR}/${NEXTCLOUD_DATA_PATH}:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=strongpassword
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloudpass
    logging: *default-logging
    restart: always

  collabora:
    container_name: ${COLLABORA_CONTAINER_NAME}
    image: collabora/code
    ports:
      - "9980:9980"
    volumes:
      - ${ROOT_PROJECT_DATA_DIR}/${NEXTCLOUD_COLLABORA_PATH}:/var/lib/mysql
    cap_add:
      - MKNOD
    environment:
      - domain=${COLLABORA_DOMAIN}
      - extra_params=--o:ssl.enable=false
      - username=admin
      - password=password
    logging: *default-logging
    restart: always
