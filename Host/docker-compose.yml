#Principale Network Configuration

networks:
  default:
    name: schub_network
    external: true  
    ipam:
      config:
        - subnet: 172.20.0.0/16

#Log Configuration

x-logging:
  &default-logging
  driver: "json-file"
  options:
    tag: "{{.Name}}"

#Container Configuration

services:

  host-plex:
    container_name: ${PLEX_CONTAINER_NAME}
    image: lscr.io/linuxserver/plex:latest
    network_mode: host
    volumes:
      - ${ROOT_PROJECT_DATA_DIR}/${PLEX_CONFIG_SAVE_PATH}:/config
      - ${ROOT_PROJECT_DATA_DIR}/${PLEX_TV_SAVE_PATH}:/tv
      - ${PLEX_MOVIE_SAVE_PATH}:/movies
    env_file:
      - ../.env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
    logging: *default-logging
    restart: unless-stopped

  host-front:
    container_name: ${FRONT_CONTAINER_NAME}
    ports:
      - ${FRONT_EXTERNAL_PORT}:${FRONT_INTERNAL_PORT}
    env_file:
      - ../.env
    build: ${FRONT_BUILD_PATH}
    hostname: front
    stdin_open: true
    tty: true
    logging: *default-logging
    restart: unless-stopped

  host-bot:
    container_name: ${DISCORD_BOT_CONTAINER_NAME}
    image: thomasschultzschub/discord-bot:latest
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - MONGODB_PATH=${MONGODB_PATH}
    logging: *default-logging
    depends_on:
      - host-mongo
    restart: unless-stopped

  host-mongo:
    container_name: ${MONGODB_CONTAINER_NAME}
    image: mongo:latest
    volumes:
      - ${ROOT_PROJECT_DATA_DIR}/${MONGODB_PATH}:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    logging: *default-logging
    restart: unless-stopped

  sonarqube:
    image: sonarqube:community
    hostname: sonarqube
    container_name: sonarqube
    read_only: true
    depends_on:
      db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_temp:/opt/sonarqube/temp
    ports:
      - "9000:9000"

  db:
    image: postgres:15
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    hostname: postgresql
    container_name: postgresql
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - postgresql:/var/lib/postgresql
      - postgresql_data:/var/lib/postgresql/data

volumes:
  sonarqube_data:
  sonarqube_temp:
  sonarqube_extensions:
  sonarqube_logs:
  postgresql:
  postgresql_data:
