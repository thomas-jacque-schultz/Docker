#Principale Network Configuration

networks:
  default:
    name: schub_network
    external: true  
    ipam:
      config:
        - subnet: 172.20.0.0/16

#Log Configuration

x-logging:
  &default-logging
  driver: "json-file"
  options:
    tag: "{{.Name}}"

#Container Configuration

services:

  host-plex:
    container_name: ${PLEX_CONTAINER_NAME}
    image: lscr.io/linuxserver/plex:latest
    network_mode: host
    volumes:
      - ${ROOT_PROJECT_DATA_DIR}/${PLEX_CONFIG_SAVE_PATH}:/config
      - ${ROOT_PROJECT_DATA_DIR}/${PLEX_TV_SAVE_PATH}:/tv
      - ${PLEX_MOVIE_SAVE_PATH}:/movies
    env_file:
      - ../.env
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
    logging: *default-logging
    restart: unless-stopped

  host-front:
    container_name: ${FRONT_CONTAINER_NAME}
    ports:
      - ${FRONT_EXTERNAL_PORT}:${FRONT_INTERNAL_PORT}
    env_file:
      - ../.env
    build: ${FRONT_BUILD_PATH}
    hostname: front
    stdin_open: true
    tty: true
    logging: *default-logging
    restart: unless-stopped

  host-bot:
    container_name: ${DISCORD_BOT_CONTAINER_NAME}
    image: thomasschultzschub/discord-bot:latest
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - MONGODB_PATH=${MONGODB_PATH}
    logging: *default-logging
    depends_on:
      - host-mongo
    restart: unless-stopped

  host-mongo:
    container_name: ${MONGODB_CONTAINER_NAME}
    image: mongo:latest
    volumes:
      - ${ROOT_PROJECT_DATA_DIR}/${MONGODB_PATH}:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
    logging: *default-logging
    restart: unless-stopped

  host-sonarqube:
    container_name: ${SONARQUBE_CONTAINER_NAME}
    image: sonarqube:latest
    ports:
      - ${SONARQUBE_EXTERNAL_PORT}:${SONARQUBE_INTERNAL_PORT}
    volumes:
      - ${ROOT_PROJECT_DATA_DIR}/${SONARQUBE_PATH}/conf:/opt/sonarqube/conf
      - ${ROOT_PROJECT_DATA_DIR}/${SONARQUBE_PATH}/data:/opt/sonarqube/data
      - ${ROOT_PROJECT_DATA_DIR}/${SONARQUBE_PATH}/extensions:/opt/sonarqube/extensions
      - ${ROOT_PROJECT_DATA_DIR}/${SONARQUBE_PATH}/logs:/opt/sonarqube/logs
    environment:
      - SONARQUBE_JDBC_URL=jdbc:postgresql://host-sonarqube-db:5432/sonar
      - SONARQUBE_JDBC_USERNAME=${SONARQUBE_JDBC_USERNAME}
      - SONARQUBE_JDBC_PASSWORD=${SONARQUBE_JDBC_PASSWORD}
    logging: *default-logging
    restart: unless-stopped

  host-sonarqube-db:
    container_name: ${SONARQUBE_DB_CONTAINER_NAME}
    image: postgres:latest
    volumes:
      - ${ROOT_PROJECT_DATA_DIR}/${SONARQUBE_DB_PATH}:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${SONARQUBE_JDBC_USERNAME}
      - POSTGRES_PASSWORD=${SONARQUBE_JDBC_PASSWORD}
      - POSTGRES_DB=sonar
    logging: *default-logging
    restart: unless-stopped
